server.port=8080
spring.application.name=api-gateway

spring.config.import=optional:configserver:http://localhost:8888

spring.cloud.gateway.discovery.locator.enabled=false

# CORS Configuration is managed in CorsConfig.java

eureka.client.service-url.defaultZone=http://localhost:8761/eureka/
eureka.instance.prefer-ip-address=false
eureka.instance.hostname=localhost

jwt.secret=${JWT_SECRET:j0bP0rt@lS3cur3S3cr3tK3y!XyZ#2024$AbCdEfGhIjKlMnOpQrStUvWxYz12}

management.endpoints.web.exposure.include=health,info,gateway,metrics,prometheus

# Zipkin / Distributed Tracing
management.tracing.sampling.probability=1.0
management.zipkin.tracing.endpoint=http://localhost:9411/api/v2/spans
logging.pattern.level=%5p [${spring.application.name:},%X{traceId:-},%X{spanId:-}]
# Allow larger multipart/file payloads through gateway (e.g. PDF resumes)
spring.codec.max-in-memory-size=20MB

# Swagger - Unified Gateway UI
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.swagger-ui.enabled=true
springdoc.api-docs.enabled=true
springdoc.swagger-ui.config-url=/v3/api-docs/swagger-config
springdoc.swagger-ui.urls[0].url=/v3/api-docs/user-service
springdoc.swagger-ui.urls[0].name=User Service
springdoc.swagger-ui.urls[1].url=/v3/api-docs/job-service
springdoc.swagger-ui.urls[1].name=Job Service
springdoc.swagger-ui.urls[2].url=/v3/api-docs/application-service
springdoc.swagger-ui.urls[2].name=Application Service
springdoc.swagger-ui.urls[3].url=/v3/api-docs/resume-service
springdoc.swagger-ui.urls[3].name=Resume Service
springdoc.swagger-ui.urls[4].url=/v3/api-docs/search-service
springdoc.swagger-ui.urls[4].name=Search Service
springdoc.swagger-ui.urls[5].url=/v3/api-docs/notification-service
springdoc.swagger-ui.urls[5].name=Notification Service
springdoc.swagger-ui.urls[6].url=/v3/api-docs/analytics-service
springdoc.swagger-ui.urls[6].name=Analytics Service
