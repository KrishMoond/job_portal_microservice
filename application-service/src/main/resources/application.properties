server.port=8083
spring.application.name=application-service

spring.config.import=optional:configserver:http://localhost:8888

# PostgreSQL - jobportal_applications
spring.datasource.url=jdbc:postgresql://localhost:5432/jobportal_applications
spring.datasource.username=${DB_USERNAME:postgres}
spring.datasource.password=${DB_PASSWORD:root}
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.open-in-view=false

# Flyway
spring.flyway.enabled=true
spring.flyway.baseline-on-migrate=true
spring.flyway.locations=classpath:db/migration

# RabbitMQ
spring.rabbitmq.host=localhost
spring.rabbitmq.port=5672
spring.rabbitmq.username=guest
spring.rabbitmq.password=guest

# Eureka
eureka.client.service-url.defaultZone=http://localhost:8761/eureka/
eureka.instance.prefer-ip-address=false
eureka.instance.hostname=localhost

management.endpoints.web.exposure.include=health,info,metrics,prometheus

# Zipkin / Distributed Tracing
management.tracing.sampling.probability=1.0
management.zipkin.tracing.endpoint=http://localhost:9411/api/v2/spans
logging.pattern.level=%5p [${spring.application.name:},%X{traceId:-},%X{spanId:-}]

# Swagger
springdoc.api-docs.path=/v3/api-docs
springdoc.swagger-ui.path=/swagger-ui/index.html
springdoc.swagger-ui.enabled=true

# --- OpenFeign timeouts (prevent multi-minute hangs) ---
spring.cloud.openfeign.client.config.default.connectTimeout=2000
spring.cloud.openfeign.client.config.default.readTimeout=5000

# --- Resilience4j Circuit Breakers ---
resilience4j.circuitbreaker.instances.job-service.sliding-window-size=10
resilience4j.circuitbreaker.instances.job-service.failure-rate-threshold=50
resilience4j.circuitbreaker.instances.job-service.wait-duration-in-open-state=15s
resilience4j.circuitbreaker.instances.job-service.permitted-number-of-calls-in-half-open-state=3
resilience4j.circuitbreaker.instances.job-service.register-health-indicator=true

resilience4j.circuitbreaker.instances.user-service.sliding-window-size=10
resilience4j.circuitbreaker.instances.user-service.failure-rate-threshold=50
resilience4j.circuitbreaker.instances.user-service.wait-duration-in-open-state=15s
resilience4j.circuitbreaker.instances.user-service.permitted-number-of-calls-in-half-open-state=3
resilience4j.circuitbreaker.instances.user-service.register-health-indicator=true

# --- Resilience4j Retry ---
resilience4j.retry.instances.job-service.max-attempts=2
resilience4j.retry.instances.job-service.wait-duration=500ms
resilience4j.retry.instances.user-service.max-attempts=2
resilience4j.retry.instances.user-service.wait-duration=500ms
