name: CI/CD Pipeline

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]

env:
  JAVA_VERSION: '21'

jobs:

  build:
    name: Build and Test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: ${{ env.JAVA_VERSION }}
          distribution: temurin
          cache: maven

      - name: Build common-lib
        run: mvn clean install -pl common-lib -q

      - name: Build and test all services
        run: |
          mvn clean package \
            -pl config-server,eureka-server,api-gateway,user-service,job-service,application-service,resume-service,search-service,notification-service,analytics-service \
            --also-make -q -DskipTests=false

      - name: Upload JAR artifacts
        uses: actions/upload-artifact@v4
        with:
          name: jars
          retention-days: 1
          path: |
            config-server/target/*.jar
            eureka-server/target/*.jar
            api-gateway/target/*.jar
            user-service/target/*.jar
            job-service/target/*.jar
            application-service/target/*.jar
            resume-service/target/*.jar
            search-service/target/*.jar
            notification-service/target/*.jar
            analytics-service/target/*.jar

  docker:
    name: Docker Build and Push
    runs-on: ubuntu-latest
    needs: build
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    strategy:
      fail-fast: false
      matrix:
        service:
          - { name: config-server }
          - { name: eureka-server }
          - { name: api-gateway }
          - { name: user-service }
          - { name: job-service }
          - { name: application-service }
          - { name: resume-service }
          - { name: search-service }
          - { name: notification-service }
          - { name: analytics-service }

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: ${{ env.JAVA_VERSION }}
          distribution: temurin
          cache: maven

      - name: Download JAR artifacts
        uses: actions/download-artifact@v4
        with:
          name: jars

      - name: Restore JARs to service target directories
        run: |
          for svc in config-server eureka-server api-gateway user-service job-service application-service resume-service search-service notification-service analytics-service; do
            mkdir -p $svc/target
            find . -maxdepth 1 -name "$svc-*.jar" -exec mv {} $svc/target/ \;
          done

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_HUB_USERNAME }}
          password: ${{ secrets.DOCKER_HUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push ${{ matrix.service.name }}
        uses: docker/build-push-action@v5
        with:
          context: ./${{ matrix.service.name }}
          push: true
          tags: |
            ${{ secrets.DOCKER_HUB_USERNAME }}/jobportal-${{ matrix.service.name }}:latest
            ${{ secrets.DOCKER_HUB_USERNAME }}/jobportal-${{ matrix.service.name }}:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
